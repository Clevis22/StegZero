<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Signal Lost | StegZero</title>
  <meta name="description" content="StegZero 404 page: the route could not be found.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --bg2: #0e1521;
      --panel: rgba(14, 21, 33, 0.82);
      --border: rgba(99, 179, 237, 0.28);
      --text: #e2ecf8;
      --muted: #7f95ad;
      --accent: #63b3ed;
      --accent2: #8bd2ff;
      --danger: #fc8181;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(99, 179, 237, 0.18), transparent 35%),
        radial-gradient(circle at 85% 80%, rgba(66, 153, 225, 0.2), transparent 40%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      overflow: hidden;
      padding: 1.2rem;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 179, 237, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 179, 237, 0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    .card {
      width: min(680px, 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.4rem, 4vw, 2.4rem);
      background: var(--panel);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 2;
      box-shadow: 0 18px 60px rgba(3, 8, 15, 0.7);
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      border: 1px solid var(--border);
      border-radius: 999px;
      display: inline-block;
      padding: 0.32rem 0.82rem;
      margin-bottom: 1rem;
      background: rgba(99, 179, 237, 0.09);
    }

    h1 {
      margin: 0;
      line-height: 0.9;
      letter-spacing: -0.03em;
      font-size: clamp(4rem, 18vw, 8.5rem);
      font-weight: 800;
      color: transparent;
      background: linear-gradient(160deg, #f4f9ff, #83ceff 60%, #63b3ed);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 34px rgba(99, 179, 237, 0.25);
      position: relative;
    }

    .subtitle {
      margin: 0.75rem 0 0;
      font-size: clamp(1.05rem, 2.8vw, 1.4rem);
      font-weight: 700;
    }

    .muted {
      margin: 0.7rem 0 1.4rem;
      font-size: 0.96rem;
      line-height: 1.65;
      color: var(--muted);
      max-width: 54ch;
    }

    .stream {
      margin: 0 0 1.4rem;
      border: 1px dashed rgba(99, 179, 237, 0.35);
      border-radius: 12px;
      background: rgba(3, 8, 15, 0.55);
      font-family: var(--mono);
      color: var(--accent2);
      font-size: 0.78rem;
      line-height: 1.75;
      padding: 0.8rem 0.9rem;
      min-height: 3.8rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
    }

    .btn {
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.65rem 1.05rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      background: rgba(99, 179, 237, 0.08);
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent2);
      background: rgba(99, 179, 237, 0.15);
    }

    .btn.primary {
      background: linear-gradient(160deg, #4b9de0, #63b3ed);
      border-color: #63b3ed;
      color: #03101d;
      font-weight: 700;
    }

    .btn.primary:hover {
      background: linear-gradient(160deg, #5ba8e6, #7cc5f2);
    }

    .status {
      margin-top: 0.9rem;
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--danger);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      .actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">StegZero // Missing Route</span>
    <h1 id="code">404</h1>
    <p class="subtitle">This page is hidden a little too well.</p>
    <p class="muted">
      The address exists only in invisible ink. Try heading back to the tool and
      keep your secrets where they belong.
    </p>

    <div class="stream" id="stream" aria-live="polite"></div>

    <div class="actions">
      <a class="btn primary" href="/">Return Home</a>
      <a class="btn" href="https://github.com/Clevis22/StegZero" target="_blank" rel="noopener">View Source</a>
      <button class="btn" id="backBtn" type="button">Go Back</button>
    </div>

    <p class="status">Error: route-not-found</p>
  </main>

  <script>
    (function () {
      var streamEl = document.getElementById('stream');
      var codeEl = document.getElementById('code');
      var backBtn = document.getElementById('backBtn');
      var tokens = ['ZWSP', 'ZWNJ', 'ZWJ', 'WJ'];

      function randomToken() {
        return tokens[Math.floor(Math.random() * tokens.length)];
      }

      function updateStream() {
        var row = [];
        var count = 24;
        for (var i = 0; i < count; i++) {
          row.push(randomToken());
        }
        streamEl.textContent = row.join(' ');
      }

      var pulse = false;
      setInterval(function () {
        pulse = !pulse;
        codeEl.style.transform = pulse ? 'translateY(-1px)' : 'translateY(0)';
        codeEl.style.filter = pulse ? 'drop-shadow(0 0 10px rgba(99,179,237,0.45))' : 'none';
      }, 700);

      updateStream();
      setInterval(updateStream, 1700);

      backBtn.addEventListener('click', function () {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/';
        }
      });
    })();
  </script>
</body>
</html>
